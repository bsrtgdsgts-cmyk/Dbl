<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DBL: Ultimate Simulator</title>
    <style>
        :root { --hero: #0088ff; --ex: #a100ff; --sp: #ffff00; --ll: #ff6a00; --ult: linear-gradient(to bottom, #0088ff, #a100ff); --ultimate: #1eff00; }
        body { background: #000; color: #fff; font-family: 'Arial Black', sans-serif; margin: 0; overflow: hidden; user-select: none; }
        .screen { width: 100vw; height: 100vh; display: none; position: relative; flex-direction: column; align-items: center; justify-content: center; background-size: cover; background-position: center; }
        
        /* MENU */
        #menu-screen { display: flex; background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://wallpaperaccess.com'); }
        .menu-btn { width: 260px; padding: 20px; margin: 10px; font-size: 1.2rem; cursor: pointer; border: 3px solid #fff; border-radius: 10px; font-weight: bold; color: white; transition: 0.2s; }
        
        /* SUMMON ANIMATION */
        #summon-anim-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 50; background-size: cover; }
        .actor { width: 70px; height: 110px; position: absolute; bottom: 25%; transition: 0.5s; border-radius: 8px; }
        #s-goku { background: orange; left: 15%; border: 2px solid #fff; }
        #s-broly { background: #228b22; right: 15%; border: 2px solid #0f0; }
        .beam { height: 40px; position: absolute; top: 55%; border-radius: 20px; display: none; }
        #s-kame { background: cyan; box-shadow: 0 0 30px blue; left: 20%; }
        #s-bomb { background: #bfff00; box-shadow: 0 0 40px green; border-radius: 50%; width: 100px; height: 100px; right: 20%; }
        #swipe-text { font-size: 3.5rem; position: absolute; bottom: 10%; display: none; cursor: pointer; animation: bounce 0.5s infinite alternate; z-index: 100; }
        
        /* REVEAL */
        .orb { width: 120px; height: 120px; border-radius: 50%; display: none; z-index: 60; box-shadow: 0 0 50px rgba(255,255,255,0.5); }
        .reveal-card { width: 280px; height: 400px; background: rgba(0,0,0,0.9); border: 4px solid #fff; border-radius: 15px; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 70; }

        /* STORY BATTLE */
        #battle-screen { background-image: url('https://images.alphacoders.com'); cursor: pointer; }
        .hp-bar { width: 180px; height: 18px; background: #333; border: 2px solid #fff; border-radius: 5px; overflow: hidden; }
        .hp-fill { height: 100%; background: #0f0; width: 100%; transition: 0.3s; }
        #ki-meter { position: absolute; bottom: 150px; font-size: 2.5rem; color: #00e5ff; text-shadow: 0 0 10px #00e5ff; }
        #charge-bar { width: 120px; height: 6px; background: rgba(255,255,255,0.2); margin: 5px auto; display: none; }
        #charge-fill { height: 100%; background: #00e5ff; width: 0%; }
        #card-hand { position: absolute; bottom: 20px; display: flex; gap: 10px; z-index: 100; }
        .card { width: 80px; height: 115px; border-radius: 10px; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; text-align: center; cursor: pointer; }
        
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-20px); } }
    </style>
</head>
<body>

    <!-- MENU -->
    <div id="menu-screen" class="screen">
        <h1 style="font-size: 3.5rem; text-shadow: 0 0 20px red; margin-bottom: 5px;">DB LEGENDS</h1>
        <h2 style="color: #ffd700;">CC: <span id="cc-display">2000</span></h2>
        <div style="background: rgba(0,0,0,0.7); padding: 30px; border-radius: 20px; border: 2px solid #444;">
            <p>Story Level: <span id="story-lv-display">1</span></p>
            <button class="menu-btn" style="background: #2979ff;" onclick="initiateSummon()">MULTI-SUMMON (1000 CC)</button>
            <button class="menu-btn" style="background: #ff1744;" onclick="enterStory()">STORY MODE</button>
        </div>
    </div>

    <!-- SUMMONING ANIMATION LAYER -->
    <div id="summon-anim-layer" class="screen">
        <div id="s-goku" class="actor"></div>
        <div id="s-broly" class="actor"></div>
        <div id="s-kame" class="beam"></div>
        <div id="s-bomb" class="beam"></div>
        <div id="swipe-text" onclick="handleSwipe()">SWIPE UP</div>
        
        <div id="orb-display" class="orb"></div>
        <div id="reveal-display" class="reveal-card">
            <h3 id="rev-count" style="color:#888"></h3>
            <h1 id="rev-rarity"></h1>
            <h2 id="rev-name"></h2>
            <p id="rev-dupes"></p>
            <button class="menu-btn" style="width:120px; padding:10px;" onclick="cycleMulti()">OK</button>
        </div>
    </div>

    <!-- BATTLE SCREEN -->
    <div id="battle-screen" class="screen" onmousedown="startKiCharge()" onmouseup="stopKiCharge()" ontouchstart="startKiCharge()" ontouchend="stopKiCharge()">
        <div id="party-switch" style="position:absolute; left:15px; top:100px; z-index:100;"></div>
        
        <div style="display:flex; justify-content:space-around; width:100%; margin-top:-100px;">
            <div style="text-align:center;">
                <div class="hp-bar"><div id="p-hp-fill" class="hp-fill"></div></div>
                <div style="width:80px; height:120px; background:orange; margin:10px auto; border-radius:10px; border:2px solid #fff;"></div>
                <p id="p-active-name"></p>
            </div>
            <div style="text-align:center;">
                <div class="hp-bar"><div id="e-hp-fill" class="hp-fill"></div></div>
                <div style="width:80px; height:120px; background:#2e7d32; margin:10px auto; border-radius:10px; border:2px solid #8bc34a;"></div>
                <p id="e-active-name">Saibaman x3</p>
            </div>
        </div>

        <div id="ki-ui" style="text-align:center;">
            <div id="ki-meter">KI: 100</div>
            <div id="charge-bar"><div id="charge-fill"></div></div>
        </div>

        <div id="card-hand">
            <div class="card red" onclick="playCard('red', event)">STRIKE<br>(25 Ki)</div>
            <div class="card yellow" onclick="playCard('yellow', event)">BLAST<br>(25 Ki)</div>
            <div class="card green" onclick="playCard('green', event)">BUFF<br>(15 Ki)</div>
            <div class="card blue" onclick="playCard('blue', event)">SPECIAL<br>(50 Ki)</div>
        </div>
    </div>

<script>
    // GLOBAL DATA
    let cc = 2000, storyLv = 1, inventory = {"Hero Goku Base": 1};
    let multiData = [], multiIdx = 0;
    const charPool = [
        { name: "Hero Goku Base", rarity: "HERO" },
        { name: "Extreme Goku SSJ", rarity: "EXTREME" },
        { name: "Extreme Goku SSJ2", rarity: "EXTREME" },
        { name: "Sparking Goku SSJ3", rarity: "SPARKING" },
        { name: "LL Goku SSJ4", rarity: "LEGENDS LIMITED" },
        { name: "Ultra Goku SSG", rarity: "ULTRA" },
        { name: "Ultra Goku SSB", rarity: "ULTRA" },
        { name: "MUI Goku", rarity: "ULTIMATE" }
    ];

    // --- SUMMONING LOGIC ---
    async function initiateSummon() {
        if(cc < 1000) return alert("Not enough CC!");
        cc -= 1000; updateUI();
        
        const anim = document.getElementById('summon-anim-layer');
        anim.style.display = 'flex';
        anim.style.backgroundImage = "url('https://images.alphacoders.com')";
        
        // Random Map
        let mapRoll = Math.random();
        if(mapRoll > 0.95) anim.style.backgroundImage = "url('https://images8.alphacoders.com')"; // Glacier
        else if(mapRoll > 0.70) anim.style.backgroundImage = "url('https://images3.alphacoders.com')"; // Dying Namek

        // Reset Actors
        document.getElementById('s-goku').style.display = 'block';
        document.getElementById('s-broly').style.display = 'block';
        document.getElementById('s-goku').style.background = (Math.random() < 0.25) ? "gold" : "orange"; // SSJ Chance

        await wait(1500);
        document.getElementById('swipe-text').style.display = 'block';
        let sRoll = Math.random();
        document.getElementById('swipe-text').style.color = (sRoll < 0.05) ? "gold" : (sRoll < 0.35 ? "red" : "cyan");
    }

    async function handleSwipe() {
        document.getElementById('swipe-text').style.display = 'none';
        const kame = document.getElementById('s-kame');
        const bomb = document.getElementById('s-bomb');
        kame.style.display = 'block'; bomb.style.display = 'block';

        let win = Math.random() < 0.85;
        if(win) {
            kame.style.width = "100vw"; bomb.style.opacity = "0";
        } else {
            bomb.style.right = "100vw"; kame.style.opacity = "0";
        }

        await wait(2000);
        document.getElementById('s-goku').style.display = 'none';
        document.getElementById('s-broly').style.display = 'none';
        kame.style.display = 'none'; bomb.style.display = 'none';
        
        // Generate 10 Results
        multiData = Array.from({length:10}, () => rollCharacter());
        multiIdx = 0;
        cycleMulti();
    }

    function cycleMulti() {
        document.getElementById('reveal-display').style.display = 'none';
        if(multiIdx >= 10) {
            document.getElementById('summon-anim-layer').style.display = 'none';
            return;
        }
        
        const char = multiData[multiIdx];
        inventory[char.name] = Math.min(5000, (inventory[char.name] || 0) + 1);
        
        const orb = document.getElementById('orb-display');
        orb.style.display = 'block';
        const colors = { HERO: "blue", EXTREME: "purple", SPARKING: "yellow", "LEGENDS LIMITED": "orange" };
        orb.style.background = colors[char.rarity] || "white";
        if(char.rarity === "ULTRA") orb.style.background = "linear-gradient(blue, purple)";
        if(char.rarity === "ULTIMATE") { orb.style.background = "blue"; setTimeout(()=>orb.style.background="green", 600); }

        setTimeout(() => {
            orb.style.display = 'none';
            document.getElementById('reveal-display').style.display = 'flex';
            document.getElementById('rev-count').innerText = `${multiIdx+1} / 10`;
            document.getElementById('rev-rarity').innerText = char.rarity;
            document.getElementById('rev-name').innerText = char.name;
            document.getElementById('rev-dupes').innerText = `Pulls: ${inventory[char.name]}`;
            multiIdx++;
            updateUI();
        }, 1200);
    }

    function rollCharacter() {
        let r = Math.random() * 100;
        if(r < 0.5) return charPool[7]; // Ultimate
        if(r < 3) return charPool[Math.floor(Math.random()*2)+5]; // Ultra
        if(r < 10) return charPool[4]; // LL
        if(r < 30) return charPool[3]; // Sparking
        if(r < 60) return charPool[Math.floor(Math.random()*2)+1]; // Extreme
        return charPool[0]; // Hero
    }

    // --- STORY BATTLE LOGIC ---
    let ki = 100, activeParty = [], activeChar = null, eHp = 10, eMax = 10, eCount = 3, chargeInt, chargeProg = 0;

    function enterStory() {
        let keys = Object.keys(inventory).slice(0, 3);
        activeParty = keys.map(k => ({
            name: k, pulls: inventory[k], hp: inventory[k]*2, max: inventory[k]*2, buff: 0
        }));
        activeChar = activeParty[0];
        eCount = 3; eMax = 10 + storyLv; eHp = eMax; ki = 100;
        
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('battle-screen').style.display = 'flex';
        renderSwitchUI(); updateBattleUI();
        startEnemyAI();
    }

    function startKiCharge() {
        if(ki >= 100) return;
        document.getElementById('charge-bar').style.display = 'block';
        chargeInt = setInterval(() => {
            chargeProg += 10;
            document.getElementById('charge-fill').style.width = chargeProg + "%";
            if(chargeProg >= 100) {
                ki = Math.min(100, ki + 30); chargeProg = 0; updateBattleUI();
            }
        }, 100);
    }

    function stopKiCharge() {
        clearInterval(chargeInt); chargeProg = 0;
        document.getElementById('charge-bar').style.display = 'none';
    }

    function playCard(type, e) {
        if(e) e.stopPropagation();
        let cost = { red: 25, yellow: 25, green: 15, blue: 50 }[type];
        if(ki < cost) return; ki -= cost;

        if(type === 'red') eHp -= (activeChar.pulls * 5) + activeChar.buff;
        if(type === 'yellow') eHp -= (activeChar.pulls * 10) + activeChar.buff;
        if(type === 'blue') eHp -= (activeChar.pulls * 20);
        if(type === 'green') { activeChar.buff += 1; activeChar.hp = Math.min(activeChar.max, activeChar.hp + 2); }

        checkBattleStatus(); updateBattleUI();
    }

    function checkBattleStatus() {
        if(eHp <= 0) {
            eCount--;
            if(eCount > 0) eHp = eMax;
            else { cc += 500; storyLv++; alert("Victory! +500 CC Reward."); endBattle(); }
        }
        if(activeChar.hp <= 0) {
            let next = activeParty.find(p => p.hp > 0);
            if(next) activeChar = next;
            else { alert("Defeat!"); endBattle(); }
        }
    }

    function startEnemyAI() {
        let ai = setInterval(() => {
            if(document.getElementById('battle-screen').style.display === 'none') return clearInterval(ai);
            activeChar.hp -= storyLv; checkBattleStatus(); updateBattleUI();
        }, 2500);
    }

    function renderSwitchUI() {
        let div = document.getElementById('party-switch'); div.innerHTML = '';
        activeParty.forEach(p => {
            let b = document.createElement('button');
            b.style.display = 'block'; b.style.margin = '5px'; b.innerText = p.name;
            b.onclick = (e) => { e.stopPropagation(); if(p.hp > 0) activeChar = p; updateBattleUI(); };
            div.appendChild(b);
        });
    }

    function updateBattleUI() {
        document.getElementById('ki-meter').innerText = `KI: ${Math.floor(ki)}`;
        document.getElementById('p-hp-fill').style.width = (activeChar.hp / activeChar.max * 100) + "%";
        document.getElementById('e-hp-fill').style.width = (eHp / eMax * 100) + "%";
        document.getElementById('p-active-name').innerText = activeChar.name;
        document.getElementById('e-active-name').innerText = `Saibaman x${eCount} (Lv ${storyLv})`;
    }

    function updateUI() {
        document.getElementById('cc-display').innerText = cc;
        document.getElementById('story-lv-display').innerText = storyLv;
    }

    function endBattle() {
        document.getElementById('battle-screen').style.display = 'none';
        document.getElementById('menu-screen').style.display = 'flex';
        updateUI();
    }

    function wait(ms) { return new Promise(res => setTimeout(res, ms)); }
    updateUI();
</script>
</body>
    </html>
