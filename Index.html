<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Warrior: Legends Clone</title>
    <style>
        :root { --gold: #ffd700; --red: #ff4444; --dark: #0a0a0a; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: white; margin: 0; display: flex; justify-content: center; }
        
        #mobile-frame { width: 100%; max-width: 400px; height: 100vh; background: linear-gradient(180deg, #101820, #000); position: relative; border: 1px solid #333; overflow: hidden; }
        .header { background: rgba(0,0,0,0.9); padding: 15px; display: flex; justify-content: space-between; border-bottom: 2px solid var(--gold); font-weight: bold; color: var(--gold); }
        
        .screen { display: none; padding: 20px; height: 85%; overflow-y: auto; text-align: center; }
        .active { display: block; }

        .btn { background: var(--gold); color: black; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; margin: 10px 0; width: 90%; font-size: 16px; }
        .btn:active { transform: scale(0.98); }
        .btn-secondary { background: #333; color: white; font-size: 12px; padding: 8px; }

        .char-card { background: #1a1a1a; border: 1px solid #444; margin: 5px; padding: 8px; border-radius: 5px; display: inline-block; width: 85px; vertical-align: top; }
        .rarity-SP { border-color: var(--gold); color: var(--gold); }
        .rarity-EX { border-color: #a0f; color: #a0f; }

        #anim-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: white; display:none; align-items:center; justify-content:center; z-index:100; color:black; font-size:2em; font-weight:900; }
    </style>
</head>
<body>

<div id="mobile-frame">
    <div class="header">
        <div>💎 <span id="crystal-count">0</span></div>
        <div onclick="resetGame()" style="cursor:pointer; font-size: 10px; color: grey;">RESET DATA</div>
    </div>

    <!-- Main Menu -->
    <div id="menu-screen" class="screen active">
        <h1 style="margin-top: 50px; font-style: italic; color: var(--gold);">LEGENDS CLONE</h1>
        <button class="btn" onclick="showScreen('story-screen')">STORY MODE</button>
        <button class="btn" onclick="showScreen('summon-screen')">SUMMON BANNERS</button>
        <button class="btn" onclick="showScreen('box-screen')">CHARACTER BOX (<span id="box-count">0</span>)</button>
    </div>

    <!-- Story Screen -->
    <div id="story-screen" class="screen">
        <h2>Event: The Training</h2>
        <p>Defeat the dummy to earn rewards.</p>
        <button class="btn" onclick="completeMission()">BATTLE! (+100 💎)</button>
        <button class="btn btn-secondary" onclick="showScreen('menu-screen')">RETURN</button>
    </div>

    <!-- Summon Screen -->
    <div id="summon-screen" class="screen">
        <h2 style="color: var(--gold);">Step-Up Banner</h2>
        <p>10 Units for 1,000 Crystals</p>
        <button class="btn" onclick="attemptSummon()">SUMMON x10</button>
        <button class="btn btn-secondary" onclick="showScreen('menu-screen')">RETURN</button>
    </div>

    <!-- Character Box -->
    <div id="box-screen" class="screen">
        <h2>Your Team</h2>
        <div id="box-list"></div>
        <button class="btn btn-secondary" onclick="showScreen('menu-screen')">RETURN</button>
    </div>

    <div id="anim-overlay">SUMMONING...</div>
</div>

<script>
    // --- CORE DATA & SAVE LOGIC ---
    let gameData = {
        crystals: 500,
        box: []
    };

    const characterPool = [
        { name: "Super Goku", rarity: "SP" },
        { name: "Final Frieza", rarity: "SP" },
        { name: "Perfect Cell", rarity: "SP" },
        { name: "Teen Gohan", rarity: "EX" },
        { name: "Android 18", rarity: "EX" },
        { name: "Saibaman", rarity: "HE" }
    ];

    function loadGame() {
        const saved = localStorage.getItem('db_legends_save');
        if (saved) {
            gameData = JSON.parse(saved);
        }
        updateUI();
    }

    function saveGame() {
        localStorage.setItem('db_legends_save', JSON.stringify(gameData));
        updateUI();
    }

    function resetGame() {
        if(confirm("Delete all progress?")) {
            localStorage.removeItem('db_legends_save');
            location.reload();
        }
    }

    // --- GAMEPLAY LOGIC ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'box-screen') renderBox();
    }

    function updateUI() {
        document.getElementById('crystal-count').innerText = gameData.crystals;
        document.getElementById('box-count').innerText = gameData.box.length;
    }

    function completeMission() {
        gameData.crystals += 100;
        saveGame();
        alert("Battle Won! Saved progress.");
        showScreen('menu-screen');
    }

    function attemptSummon() {
        if (gameData.crystals < 1000) return alert("Insufficient Crystals!");
        
        gameData.crystals -= 1000;
        const overlay = document.getElementById('anim-overlay');
        overlay.style.display = 'flex';

        setTimeout(() => {
            overlay.style.display = 'none';
            for(let i=0; i<10; i++) {
                let pick = characterPool[Math.floor(Math.random() * characterPool.length)];
                gameData.box.push(pick);
            }
            saveGame();
            showScreen('box-screen');
        }, 1200);
    }

    function renderBox() {
        const list = document.getElementById('box-list');
        list.innerHTML = gameData.box.map(char => `
            <div class="char-card rarity-${char.rarity}">
                <small>${char.rarity}</small><br>
                <b>${char.name}</b>
            </div>
        `).join('');
    }

    // Initialize
    loadGame();
</script>

</body>
      </html>
