<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB Legends Summon Simulator</title>
    <style>
        :root {
            --blue: #0088ff; --red: #ff0000; --gold: #ffd700;
            --hero: #00d2ff; --ex: #a100ff; --sp: #ffff00;
            --ll: #ff6a00; --ult: linear-gradient(45deg, #0088ff, #a100ff);
            --ultimate: #1eff00;
        }
        body { background: #000; color: #fff; font-family: 'Arial Black', sans-serif; margin: 0; overflow: hidden; text-align: center; }
        
        #game-screen { width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; background-size: cover; background-position: center; transition: background 1s; }
        
        #ui-overlay { z-index: 10; }
        .cc-display { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; color: #ffd700; }
        .btn { padding: 15px 30px; font-size: 1.2rem; background: #222; border: 2px solid #fff; color: #fff; cursor: pointer; border-radius: 5px; }
        .btn:disabled { opacity: 0.5; }

        #animation-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; flex-direction: column; justify-content: center; align-items: center; }
        #swipe-prompt { font-size: 3rem; font-weight: bold; pointer-events: auto; cursor: ns-resize; display: none; animation: pulse 1s infinite; }
        
        .char-reveal { width: 250px; height: 350px; border: 4px solid #fff; border-radius: 10px; display: none; flex-direction: column; justify-content: center; background: rgba(0,0,0,0.8); z-index: 20; }
        .orb { width: 100px; height: 100px; border-radius: 50%; margin: 20px auto; display: none; box-shadow: 0 0 50px rgba(255,255,255,0.5); }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="game-screen" style="background-image: url('https://images.alphacoders.com');">
    <div class="cc-display">Chrono Crystals: <span id="cc-count">2000</span></div>
    
    <div id="ui-overlay">
        <button class="btn" id="summon-btn" onclick="startSummon()">SUMMON (1,000 CC)</button>
    </div>

    <div id="animation-layer">
        <h2 id="action-text"></h2>
        <div id="swipe-prompt">SWIPE UP</div>
        <div id="orb-display" class="orb"></div>
        <div id="result-display" class="char-reveal">
            <h1 id="res-rarity"></h1>
            <h2 id="res-name"></h2>
            <p id="res-stats">Damage: +0</p>
            <button class="btn" onclick="reset()">OK</button>
        </div>
    </div>
</div>

<script>
    let cc = 2000;
    let inventory = {};
    const maps = ['Namek (Common)', 'Dying Namek (Rare)', 'Glacier (Ultra Rare)'];
    
    const characters = [
        { name: "Goku (Base)", rarity: "HERO", color: "var(--hero)", weight: 60 },
        { name: "Goku (SSJ)", rarity: "EXTREME", color: "var(--ex)", weight: 20 },
        { name: "Goku (SSJ2)", rarity: "EXTREME", color: "var(--ex)", weight: 10 },
        { name: "Goku (SSJ3)", rarity: "SPARKING", color: "var(--sp)", weight: 7 },
        { name: "Goku (SSJ4)", rarity: "LEGENDS LIMITED", color: "var(--ll)", weight: 2 },
        { name: "Goku (SSG)", rarity: "ULTRA", color: "var(--ult)", weight: 0.5 },
        { name: "Goku (SSB)", rarity: "ULTRA", color: "var(--ult)", weight: 0.4 },
        { name: "Goku (MUI)", rarity: "ULTIMATE", color: "var(--ultimate)", weight: 0.1 }
    ];

    function startSummon() {
        if (cc < 1000) return alert("Not enough CC!");
        cc -= 1000;
        document.getElementById('cc-count').innerText = cc;
        document.getElementById('ui-overlay').style.display = 'none';
        document.getElementById('animation-layer').style.display = 'flex';
        
        runSequence();
    }

    async function runSequence() {
        const text = document.getElementById('action-text');
        const screen = document.getElementById('game-screen');
        
        // 1. Map Selection
        let randMap = Math.random();
        let currentMap = maps[0];
        if (randMap > 0.95) currentMap = maps[2];
        else if (randMap > 0.70) currentMap = maps[1];
        text.innerText = "Location: " + currentMap;
        
        await wait(2000);
        
        // 2. SSJ Transformation (25%)
        let isSSJ = Math.random() < 0.25;
        text.innerText = isSSJ ? "Goku turns Super Saiyan!" : "Goku faces Broly...";
        
        await wait(2000);
        
        // 3. Initial Fight (85% win)
        let winFight = Math.random() < 0.85;
        text.innerText = "THEY ARE FIGHTING!";
        await wait(2000);
        
        if (winFight) {
            text.innerText = "Goku fires a Blue Kamehameha!";
        } else {
            text.innerText = "Broly throws a Green Spirit Bomb!";
        }

        await wait(2000);

        // 4. Swipe Clash
        text.innerText = "CLASH!";
        const swipe = document.getElementById('swipe-prompt');
        let swipeColor = "var(--blue)";
        let bonus = 0;
        
        let swipeRand = Math.random();
        if (swipeRand < 0.05) { swipeColor = "var(--gold)"; bonus = 10; }
        else if (swipeRand < 0.35) { swipeColor = "var(--red)"; bonus = 5; }
        
        swipe.style.color = swipeColor;
        swipe.style.display = 'block';
        swipe.onmousedown = () => finishClash(bonus); // Simplified swipe for desktop
    }

    async function finishClash(bonus) {
        document.getElementById('swipe-prompt').style.display = 'none';
        const text = document.getElementById('action-text');
        
        let winClash = Math.random() < 0.80;
        if (winClash) {
            text.innerText = "Kamehameha pierces Broly! EXPLOSION!";
        } else {
            text.innerText = "Spirit Bomb overwhelms Goku! EXPLOSION!";
        }

        await wait(2000);
        revealCharacter(bonus);
    }

    function revealCharacter(bonus) {
        const orb = document.getElementById('orb-display');
        const char = getRandomCharacter(bonus);
        
        document.getElementById('action-text').innerText = "";
        orb.style.display = 'block';
        
        // Set Orb Color
        if (char.rarity === "HERO") orb.style.background = "blue";
        if (char.rarity === "EXTREME") orb.style.background = "purple";
        if (char.rarity === "SPARKING") orb.style.background = "yellow";
        if (char.rarity === "LEGENDS LIMITED") orb.style.background = "darkorange";
        if (char.rarity === "ULTRA") orb.style.background = "linear-gradient(to right, blue, purple)";
        if (char.rarity === "ULTIMATE") {
            orb.style.background = "blue";
            setTimeout(() => orb.style.background = "green", 1000);
        }

        setTimeout(() => {
            orb.style.display = 'none';
            showResult(char);
        }, 2500);
    }

    function getRandomCharacter(bonus) {
        // Simple weighted random logic
        let roll = Math.random() * 100 - bonus;
        if (roll < 0.5) return characters[7]; // Ultimate
        if (roll < 1.5) return characters[6]; // Ultra SSB
        if (roll < 3.0) return characters[5]; // Ultra SSG
        if (roll < 10) return characters[4]; // LL
        if (roll < 25) return characters[3]; // Sparking
        if (roll < 50) return characters[1]; // Extreme
        return characters[0]; // Hero
    }

    function showResult(char) {
        const res = document.getElementById('result-display');
        res.style.display = 'flex';
        document.getElementById('res-rarity').innerText = char.rarity;
        document.getElementById('res-rarity').style.color = char.rarity === "ULTIMATE" ? "green" : "white";
        document.getElementById('res-name').innerText = char.name;
        
        // Dupe Logic
        inventory[char.name] = (inventory[char.name] || 0) + 1;
        document.getElementById('res-stats').innerText = `Damage Boost: +${inventory[char.name] - 1}`;
    }

    function reset() {
        document.getElementById('result-display').style.display = 'none';
        document.getElementById('animation-layer').style.display = 'none';
        document.getElementById('ui-overlay').style.display = 'block';
    }

    function wait(ms) { return new Promise(res => setTimeout(res, ms)); }
</script>

</body>
</html>
