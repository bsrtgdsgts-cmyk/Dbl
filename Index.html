<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBL Visual Summon</title>
    <style>
        :root {
            --hero: #00d2ff; --ex: #a100ff; --sp: #ffff00;
            --ll: #ff6a00; --ult: linear-gradient(45deg, #0088ff, #a100ff);
            --ultimate: #1eff00;
        }
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }
        
        /* Stages */
        #stage { width: 100vw; height: 100vh; position: relative; background: url('https://images.alphacoders.com') center/cover; }
        .ui { position: absolute; z-index: 100; width: 100%; text-align: center; top: 50%; }

        /* Characters */
        .actor { width: 60px; height: 100px; position: absolute; bottom: 20%; transition: all 0.5s; border-radius: 10px; }
        #goku { background: orange; left: 10%; border: 2px solid #fff; box-shadow: 0 0 15px orange; }
        #broly { background: #228b22; right: 10%; border: 2px solid #0f0; box-shadow: 0 0 15px #0f0; }
        
        /* Aura */
        .ssj { box-shadow: 0 0 40px yellow !important; background: gold !important; }

        /* Effects */
        .beam { height: 40px; position: absolute; top: 50%; display: none; border-radius: 20px; z-index: 50; }
        #kamehameha { background: cyan; box-shadow: 0 0 30px blue; left: 15%; }
        #spirit-bomb { background: #bfff00; box-shadow: 0 0 40px green; right: 15%; border-radius: 50%; width: 100px; height: 100px; top: 40%; }

        /* Swipe UI */
        #swipe-zone { display: none; position: absolute; bottom: 10%; width: 100%; text-align: center; cursor: pointer; z-index: 200; }
        .swipe-text { font-size: 3rem; font-weight: 900; animation: bounce 0.5s infinite alternate; }

        /* Results */
        .orb { width: 120px; height: 120px; border-radius: 50%; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); display: none; z-index: 300; }
        .card { width: 260px; height: 380px; background: rgba(0,0,0,0.9); border: 3px solid #fff; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; z-index: 400; flex-direction: column; align-items: center; justify-content: center; border-radius: 15px; }

        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-20px); } }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 20% { transform: translate(-3px, 0px); } 100% { transform: translate(1px, -2px); } }
    </style>
</head>
<body>

<div id="stage">
    <div class="ui" id="menu">
        <button onclick="startSummon()" style="padding: 20px; font-size: 1.5rem; cursor:pointer;">SUMMON (1,000 CC)</button>
    </div>

    <!-- Actors -->
    <div id="goku" class="actor" style="display:none"></div>
    <div id="broly" class="actor" style="display:none"></div>

    <!-- Projectiles -->
    <div id="kamehameha" class="beam"></div>
    <div id="spirit-bomb" class="beam"></div>

    <!-- Swipe -->
    <div id="swipe-zone" onclick="resolveClash()">
        <div id="swipe-label" class="swipe-text">SWIPE UP</div>
    </div>

    <!-- Orbs & Cards -->
    <div id="orb" class="orb"></div>
    <div id="card" class="card">
        <h1 id="rarity-text"></h1>
        <h2 id="name-text"></h2>
        <p id="dupe-text"></p>
        <button onclick="nextCard()" style="padding: 10px 20px;">OK</button>
    </div>
</div>

<script>
    let inventory = {};
    let multiResults = [];
    let currentIdx = 0;

    const chars = [
        { n: "Hero Goku", r: "HERO" },
        { n: "EX Goku SSJ", r: "EXTREME" },
        { n: "EX Goku SSJ2", r: "EXTREME" },
        { n: "SP Goku SSJ3", r: "SPARKING" },
        { n: "LL Goku SSJ4", r: "LEGENDS LIMITED" },
        { n: "Ultra Goku SSG", r: "ULTRA" },
        { n: "Ultra Goku SSB", r: "ULTRA" },
        { n: "MUI Goku", r: "ULTIMATE" }
    ];

    async function startSummon() {
        document.getElementById('menu').style.display = 'none';
        const goku = document.getElementById('goku');
        const broly = document.getElementById('broly');
        
        // Setup Map
        let mapRoll = Math.random();
        if(mapRoll > 0.95) document.getElementById('stage').style.backgroundImage = "url('https://images8.alphacoders.com')"; 
        
        // Show Fighters
        goku.style.display = 'block';
        broly.style.display = 'block';
        
        // SSJ Chance
        if(Math.random() < 0.25) goku.classList.add('ssj');

        await wait(1000);
        
        // Fighting Animation (Moving towards center)
        goku.style.left = "35%";
        broly.style.right = "35%";
        document.getElementById('stage').style.animation = "shake 0.1s infinite";
        
        await wait(2000);
        document.getElementById('stage').style.animation = "none";

        // Swipe Setup
        const swipe = document.getElementById('swipe-zone');
        const label = document.getElementById('swipe-label');
        let sRoll = Math.random();
        label.style.color = "cyan";
        if(sRoll < 0.05) label.style.color = "gold";
        else if(sRoll < 0.35) label.style.color = "red";
        
        swipe.style.display = 'block';
    }

    async function resolveClash() {
        document.getElementById('swipe-zone').style.display = 'none';
        const beam = document.getElementById('kamehameha');
        const bomb = document.getElementById('spirit-bomb');
        
        beam.style.display = 'block';
        bomb.style.display = 'block';
        
        // Clash Animation
        let win = Math.random() < 0.80;
        
        if(win) {
            beam.style.width = "80vw";
            bomb.style.opacity = "0";
            document.getElementById('broly').style.opacity = "0";
        } else {
            bomb.style.right = "80vw";
            beam.style.opacity = "0";
            document.getElementById('goku').style.opacity = "0";
        }

        await wait(2000);
        
        // Prepare Multi
        multiResults = Array.from({length: 10}, () => rollChar());
        currentIdx = 0;
        showOrb();
    }

    function showOrb() {
        const orb = document.getElementById('orb');
        const c = multiResults[currentIdx];
        orb.style.display = 'block';
        
        // Orb Logic
        let colors = { HERO: "blue", EXTREME: "purple", SPARKING: "yellow", "LEGENDS LIMITED": "orange" };
        orb.style.background = colors[c.r] || "white";
        if(c.r === "ULTRA") orb.style.background = "linear-gradient(blue, purple)";
        if(c.r === "ULTIMATE") {
            orb.style.background = "blue";
            setTimeout(() => orb.style.background = "green", 500);
        }

        setTimeout(() => {
            orb.style.display = 'none';
            revealCard(c);
        }, 1200);
    }

    function revealCard(c) {
        document.getElementById('card').style.display = 'flex';
        document.getElementById('rarity-text').innerText = c.r;
        document.getElementById('name-text').innerText = c.n;
        inventory[c.n] = (inventory[c.n] || 0) + 1;
        document.getElementById('dupe-text').innerText = `Dupes: ${inventory[c.n] - 1}`;
    }

    function nextCard() {
        document.getElementById('card').style.display = 'none';
        currentIdx++;
        if(currentIdx < 10) showOrb();
        else location.reload(); // Reset game
    }

    function rollChar() {
        let r = Math.random() * 100;
        if(r < 0.5) return chars[7];
        if(r < 3) return chars[6];
        if(r < 10) return chars[4];
        if(r < 30) return chars[3];
        return chars[Math.floor(Math.random()*3)];
    }

    function wait(ms) { return new Promise(res => setTimeout(res, ms)); }
</script>

</body>
</html>
