<!DOCTYPE html>
<html>
<head>
    <title>Background CR Coach</title>
    <style>
        body { background: #121212; color: #fdbb2d; text-align: center; padding-top: 100px; font-family: sans-serif; }
        .mic-active { color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🎮 Background Coach</h1>
    <p id="status">Press Start before entering Clash Royale</p>
    <button onclick="startCoach()" style="padding: 20px; font-size: 20px; border-radius: 10px;">Start AI Coaching</button>

    <script>
        const synth = window.speechSynthesis;
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.continuous = true; // Essential for background listening

        function startCoach() {
            recognition.start();
            document.getElementById('status').innerText = "AI Active! You can now switch to Clash Royale.";
            speak("Coach is active. Good luck in the arena!");
            
            // Keep-alive: Speak a status check every 2 minutes
            setInterval(() => {
                if (!synth.speaking) speak("I am still here watching your match.");
            }, 120000);
        }

        recognition.onresult = (event) => {
            const last = event.results.length - 1;
            const command = event.results[last][0].transcript.toLowerCase();
            
            if (command.includes("hog")) speak("Opponent's Hog is out of cycle for four cards.");
            if (command.includes("elixir")) speak("Based on time, they should have around 7 elixir.");
        };

        function speak(text) {
            const utter = new SpeechSynthesisUtterance(text);
            synth.speak(utter);
        }
        
        // Restart if it stops
        recognition.onend = () => recognition.start();
    </script>
</body>
</html>
