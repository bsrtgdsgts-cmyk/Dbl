<!DOCTYPE html>
<html>
<head>
    <title>Ultimate CR Assistant</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; }
        .box { border: 2px solid #fdbb2d; padding: 20px; margin: 20px; border-radius: 15px; }
        #elixir { font-size: 3em; color: #fdbb2d; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🎙️ AI Battle Assistant</h1>
        <div id="elixir">0.0</div>
        <p>Last Card Detected: <span id="card">None</span></p>
        <button onclick="speakStats()">🔊 Hear Status</button>
    </div>

    <script>
        async function updateData() {
            try {
                const response = await fetch('http://localhost:5000/data');
                const data = await response.json();
                
                document.getElementById('elixir').innerText = data.opponent_elixir.toFixed(1);
                document.getElementById('card').innerText = data.last_card;
            } catch (e) {
                console.log("Python script not running yet...");
            }
        }

        function speakStats() {
            const text = `Opponent has ${document.getElementById('elixir').innerText} elixir.`;
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(text));
        }

        setInterval(updateData, 1000); // Sync every second
    </script>
</body>
</html>
